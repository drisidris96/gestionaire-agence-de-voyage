kind = "web"
previewPath = "/"
title = "نظام إدارة الوكالة السياحية"
version = "1.0.0"
id = "artifacts/travel-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19981

[services.development]
run = "pnpm --filter @workspace/travel-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-agency", "run", "build" ]
publicDir = "artifacts/travel-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19981"
BASE_PATH = "/"
