server {
    listen 80;
    listen [::]:80;
    server_name buydriss.co.uk www.buydriss.co.uk;

    # Certbot سيستبدل هذا تلقائياً بـ HTTPS
    # في البداية يعمل HTTP فقط حتى تشغّل certbot

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    root /var/www/atlas-travel/public;
    index index.html;

    # API → Node.js عبر PM2
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # شعار الوكالة والصور المرفوعة
    location /uploads/ {
        alias /var/www/atlas-travel/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ملفات الـ frontend الثابتة (cache طويل لـ JS/CSS لأنها hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # SPA fallback — كل المسارات الأخرى ترجع index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
