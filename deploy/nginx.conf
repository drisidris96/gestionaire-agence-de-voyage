# Nginx — ضعه في: /etc/nginx/sites-available/chouiaar
# ثم: sudo ln -s /etc/nginx/sites-available/chouiaar /etc/nginx/sites-enabled/
# ثم: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ────────────────────────────────────────
    # Frontend (ملفات React المبنية بـ Vite)
    # ────────────────────────────────────────
    root /var/www/chouiaar/artifacts/travel-agency/dist/public;
    index index.html;

    # SPA: كل مسار غير موجود → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────────────────
    # API (Express على المنفذ 8080)
    # ────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ────────────────────────────────────────
    # ضغط gzip
    # ────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ────────────────────────────────────────
    # Cache للملفات الثابتة
    # ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# ────────────────────────────────────────────────────────────
# HTTPS — بعد تثبيت Certbot شغّل:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot سيضيف بلوك server على 443 تلقائياً
# ────────────────────────────────────────────────────────────
