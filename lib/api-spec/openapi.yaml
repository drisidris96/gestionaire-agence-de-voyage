openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Travel Agency Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: destinations
    description: Destination management
  - name: packages
    description: Travel package management
  - name: bookings
    description: Booking management
  - name: payments
    description: Payment management
  - name: dashboard
    description: Dashboard statistics
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Clients ───────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Client deleted
        "404":
          description: Client not found

  # ─── Destinations ──────────────────────────────────────────────────────────
  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: List all destinations
      responses:
        "200":
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"
    post:
      operationId: createDestination
      tags: [destinations]
      summary: Create a new destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDestinationBody"
      responses:
        "201":
          description: Destination created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"

  /destinations/{id}:
    get:
      operationId: getDestination
      tags: [destinations]
      summary: Get a destination by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Destination found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
        "404":
          description: Not found
    patch:
      operationId: updateDestination
      tags: [destinations]
      summary: Update a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDestinationBody"
      responses:
        "200":
          description: Destination updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
        "404":
          description: Not found
    delete:
      operationId: deleteDestination
      tags: [destinations]
      summary: Delete a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Destination deleted

  # ─── Packages ──────────────────────────────────────────────────────────────
  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List all travel packages
      parameters:
        - name: destinationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"
    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a new package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageBody"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get a package by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          description: Not found
    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update a package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePackageBody"
      responses:
        "200":
          description: Package updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          description: Not found
    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Delete a package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Package deleted

  # ─── Bookings ──────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Booking deleted

  # ─── Payments ─────────────────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List all payments
      parameters:
        - name: bookingId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get a payment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Not found
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Payment deleted

  # ─── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-bookings:
    get:
      operationId: getRecentBookings
      tags: [dashboard]
      summary: Get recent bookings for dashboard
      responses:
        "200":
          description: Recent bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /dashboard/revenue-by-month:
    get:
      operationId: getRevenueByMonth
      tags: [dashboard]
      summary: Monthly revenue breakdown
      responses:
        "200":
          description: Revenue by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

  /dashboard/bookings-by-status:
    get:
      operationId: getBookingsByStatus
      tags: [dashboard]
      summary: Count of bookings grouped by status
      responses:
        "200":
          description: Bookings by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingStatusCount"

  # ─── Storage ────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Client ─────────────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, fullName, phone, email, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientBody:
      type: object
      required: [fullName, phone, email]
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    UpdateClientBody:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ─── Destination ─────────────────────────────────────────────────────────
    Destination:
      type: object
      required: [id, name, country, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    CreateDestinationBody:
      type: object
      required: [name, country]
      properties:
        name:
          type: string
        country:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        price:
          type: ["number", "null"]

    UpdateDestinationBody:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        price:
          type: ["number", "null"]

    # ─── Package ─────────────────────────────────────────────────────────────
    Package:
      type: object
      required: [id, name, destinationId, durationDays, pricePerPerson, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        destinationId:
          type: integer
        destinationName:
          type: ["string", "null"]
        destinationCountry:
          type: ["string", "null"]
        durationDays:
          type: integer
        pricePerPerson:
          type: number
        description:
          type: ["string", "null"]
        includes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreatePackageBody:
      type: object
      required: [name, destinationId, durationDays, pricePerPerson]
      properties:
        name:
          type: string
        destinationId:
          type: integer
        durationDays:
          type: integer
        pricePerPerson:
          type: number
        description:
          type: ["string", "null"]
        includes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    UpdatePackageBody:
      type: object
      properties:
        name:
          type: string
        destinationId:
          type: integer
        durationDays:
          type: integer
        pricePerPerson:
          type: number
        description:
          type: ["string", "null"]
        includes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    # ─── Booking ─────────────────────────────────────────────────────────────
    Booking:
      type: object
      required: [id, clientId, packageId, travelDate, numberOfPersons, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        packageId:
          type: integer
        packageName:
          type: ["string", "null"]
        destinationName:
          type: ["string", "null"]
        travelDate:
          type: string
          format: date-time
        returnDate:
          type: ["string", "null"]
          format: date-time
        numberOfPersons:
          type: integer
        totalPrice:
          type: number
        paidAmount:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBookingBody:
      type: object
      required: [clientId, packageId, travelDate, numberOfPersons, totalPrice]
      properties:
        clientId:
          type: integer
        packageId:
          type: integer
        travelDate:
          type: string
          format: date-time
        returnDate:
          type: ["string", "null"]
          format: date-time
        numberOfPersons:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: ["string", "null"]

    UpdateBookingBody:
      type: object
      properties:
        clientId:
          type: integer
        packageId:
          type: integer
        travelDate:
          type: string
          format: date-time
        returnDate:
          type: ["string", "null"]
          format: date-time
        numberOfPersons:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: ["string", "null"]

    # ─── Payment ─────────────────────────────────────────────────────────────
    Payment:
      type: object
      required: [id, bookingId, amount, paymentDate, method, createdAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        clientName:
          type: ["string", "null"]
        amount:
          type: number
        paymentDate:
          type: string
          format: date-time
        method:
          type: string
          enum: [cash, card, bank_transfer, cheque]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CreatePaymentBody:
      type: object
      required: [bookingId, amount, method]
      properties:
        bookingId:
          type: integer
        amount:
          type: number
        paymentDate:
          type: string
          format: date-time
        method:
          type: string
          enum: [cash, card, bank_transfer, cheque]
        notes:
          type: ["string", "null"]

    # ─── Dashboard ───────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalClients, totalBookings, totalRevenue, pendingBookings, confirmedBookings, cancelledBookings, completedBookings, totalPackages, totalDestinations]
      properties:
        totalClients:
          type: integer
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        pendingBookings:
          type: integer
        confirmedBookings:
          type: integer
        cancelledBookings:
          type: integer
        completedBookings:
          type: integer
        totalPackages:
          type: integer
        totalDestinations:
          type: integer

    MonthlyRevenue:
      type: object
      required: [month, revenue, bookings]
      properties:
        month:
          type: string
        revenue:
          type: number
        bookings:
          type: integer

    BookingStatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # ─── Storage ──────────────────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
